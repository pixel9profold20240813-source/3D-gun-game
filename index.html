<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS - Roblox Style</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        canvas { display: block; }

        /* 準心 */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 24px; height: 24px;
            border: 2px solid rgba(0, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::after {
            content: ''; position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: lime; border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* UI 資訊欄 */
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: #00ffff; font-size: 22px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
            pointer-events: none; z-index: 10;
        }
        .stat-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; border: 1px solid #00ffff; margin-bottom: 10px; }

        /* 排行榜面板 */
        #leaderboard-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95);
            color: white; padding: 40px;
            border-radius: 20px; display: none;
            text-align: center; min-width: 350px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            z-index: 100; border: 2px solid #00ffff;
        }
        h2 { color: #00ffff; margin-top: 0; letter-spacing: 2px; }
        #leaderboard-list { list-style: none; padding: 0; margin: 25px 0; font-size: 18px; }
        #leaderboard-list li { 
            padding: 12px; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between;
        }
        button {
            padding: 12px 35px; cursor: pointer; font-size: 18px;
            background: #00ffff; color: #000; font-weight: bold;
            border: none; border-radius: 5px; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #00ffff; }

        #start-hint {
            position: absolute; bottom: 15%; width: 100%;
            text-align: center; color: #00ffff; font-size: 28px;
            text-shadow: 0 0 15px #00ffff; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <div class="stat-box">得分：<span id="score">0</span></div>
        <div class="stat-box">剩餘時間：<span id="timer">30</span>s</div>
    </div>

    <div id="start-hint">點擊畫面開始狩獵</div>

    <div id="leaderboard-panel">
        <h2>MISSION COMPLETE</h2>
        <p>全球英雄榜</p>
        <ul id="leaderboard-list"></ul>
        <button onclick="location.reload()">重新挑戰</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "firebase/firestore";

        // --- Firebase 設定 ---
        const firebaseConfig = {
          apiKey: "AIzaSyBufMLTIXLeBjj_kNTPKEKyKCU29Zb4iD8",
          authDomain: "d-gungame.firebaseapp.com",
          projectId: "d-gungame",
          storageBucket: "d-gungame.firebasestorage.app",
          messagingSenderId: "799621642625",
          appId: "1:799621642625:web:16b00ab30d466f4c2fd080",
          measurementId: "G-RXHQCJNNVX"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 遊戲邏輯變數 ---
        let score = 0, timeLeft = 30, gameActive = false, gameEnded = false;
        const keys = {};
        
        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        // 漸層天空效果
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 1, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光源
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x00ffff, 1, 100);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // 好看的地板：深色金屬網格
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhongMaterial({ 
            color: 0x111111, 
            shininess: 100,
            specular: 0x00ffff 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        
        const grid = new THREE.GridHelper(200, 100, 0x00ffff, 0x222222);
        scene.add(grid);

        // --- 仿 Roblox 小人 (Dummy) ---
        let dummy = new THREE.Group();
        let leftArm, rightArm, leftLeg, rightLeg;

        function createDummy() {
            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
            const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const head = new THREE.Mesh(headGeo, mat);
            head.position.y = 1.6;

            const torsoGeo = new THREE.BoxGeometry(1, 1.2, 0.5);
            const torso = new THREE.Mesh(torsoGeo, mat);
            torso.position.y = 0.8;

            const limbGeo = new THREE.BoxGeometry(0.4, 0.8, 0.4);
            leftArm = new THREE.Mesh(limbGeo, mat);
            leftArm.position.set(-0.7, 1.0, 0);
            
            rightArm = new THREE.Mesh(limbGeo, mat);
            rightArm.position.set(0.7, 1.0, 0);

            leftLeg = new THREE.Mesh(limbGeo, mat);
            leftLeg.position.set(-0.3, 0.4, 0);

            rightLeg = new THREE.Mesh(limbGeo, mat);
            rightLeg.position.set(0.3, 0.4, 0);

            dummy.add(head, torso, leftArm, rightArm, leftLeg, rightLeg);
            scene.add(dummy);
            resetDummyPosition();
        }

        function resetDummyPosition() {
            dummy.position.set((Math.random() - 0.5) * 40, 0, (Math.random() - 0.5) * 40);
            dummy.rotation.y = Math.random() * Math.PI * 2;
        }

        createDummy();

        // --- 敵人移動 AI ---
        let dummySpeed = 0.08;
        let dummyDirection = new THREE.Vector3(0, 0, 1);
        let lastTurnTime = 0;

        function updateDummy(time) {
            // 隨機轉向
            if (time - lastTurnTime > 2000) {
                dummy.rotation.y += (Math.random() - 0.5) * 2;
                lastTurnTime = time;
            }

            // 移動
            dummy.translateZ(dummySpeed);

            // 邊界檢查
            if (Math.abs(dummy.position.x) > 45 || Math.abs(dummy.position.z) > 45) {
                dummy.rotation.y += Math.PI;
            }

            // 走路動畫 (擺動四肢)
            const swing = Math.sin(time * 0.01) * 0.5;
            leftArm.rotation.x = swing;
            rightArm.rotation.x = -swing;
            leftLeg.rotation.x = -swing;
            rightLeg.rotation.x = swing;
        }

        // --- 射擊與控制 ---
        const raycaster = new THREE.Raycaster();
        
        function shoot() {
            if (!gameActive || gameEnded) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(dummy.children);
            if (intersects.length > 0) {
                score++;
                document.getElementById('score').innerText = score;
                resetDummyPosition();
            }
        }

        document.addEventListener('mousedown', () => {
            if (gameEnded) return;
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
            } else {
                shoot();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                gameActive = true;
                document.getElementById('start-hint').style.display = 'none';
                if (timeLeft === 30) startTimer();
            } else {
                gameActive = false;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && !gameEnded) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 遊戲流程與 Firebase ---
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        async function endGame() {
            gameEnded = true;
            document.exitPointerLock();
            const playerName = prompt("戰鬥結束！請輸入你的代號：", "無名獵人") || "無名獵人";

            try {
                await addDoc(collection(db, "leaderboard"), {
                    name: playerName,
                    score: score,
                    createdAt: serverTimestamp()
                });

                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5));
                const snap = await getDocs(q);
                const listEl = document.getElementById('leaderboard-list');
                listEl.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    listEl.innerHTML += `<li><span>${d.name}</span> <span>${d.score} PTS</span></li>`;
                });
                document.getElementById('leaderboard-panel').style.display = 'block';
            } catch (e) {
                console.error(e);
                alert("資料庫連線失敗，請檢查 Firestore 規則。");
            }
        }

        // --- 主循環 ---
        camera.position.set(0, 1.7, 10);
        const playerSpeed = 0.15;

        function animate(time) {
            requestAnimationFrame(animate);

            if (gameActive && !gameEnded) {
                // 玩家移動
                const dir = new THREE.Vector3();
                if (keys['KeyW']) dir.z -= 1;
                if (keys['KeyS']) dir.z += 1;
                if (keys['KeyA']) dir.x -= 1;
                if (keys['KeyD']) dir.x += 1;
                dir.normalize();

                const yaw = camera.rotation.y;
                camera.position.x += (Math.sin(yaw) * dir.z + Math.sin(yaw + Math.PI/2) * dir.x) * playerSpeed;
                camera.position.z += (Math.cos(yaw) * dir.z + Math.cos(yaw + Math.PI/2) * dir.x) * playerSpeed;
                
                updateDummy(time);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
