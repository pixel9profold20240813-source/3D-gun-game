<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER STRIKE - Sci-Fi FPS</title>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-magenta: #ff00ff; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #050505; color: white; }
        canvas { display: block; }

        /* UI Overlays */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 18px; height: 18px;
            border: 2px solid var(--neon-cyan); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: white; transform: translate(-50%, -50%); }

        #hud {
            position: absolute; bottom: 30px; left: 30px;
            pointer-events: none; display: none;
        }
        .stat-label { font-size: 14px; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        
        #hp-container { width: 250px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid var(--neon-cyan); }
        #hp-fill { width: 100%; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.3s; }

        #ammo-hud { position: absolute; bottom: 30px; right: 40px; text-align: right; display: none; }

        /* Settings Button */
        #settings-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--neon-cyan);
            color: white; padding: 10px; cursor: pointer; border-radius: 5px; z-index: 110;
        }

        /* Panels */
        .overlay-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon-cyan);
            padding: 40px; border-radius: 15px; text-align: center; z-index: 100; min-width: 300px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        button.primary-btn {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 15px 40px; font-size: 20px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; transition: 0.3s;
        }
        button.primary-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); }

        #settings-panel { display: none; }
        .setting-row { margin: 20px 0; text-align: left; }
        input[type="range"] { width: 100%; accent-color: var(--neon-cyan); }

        #damage-flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,0,0,0); pointer-events: none; z-index: 5;
        }

        #leaderboard-list { list-style: none; padding: 0; text-align: left; border-top: 1px solid #333; margin-top: 20px; }
        #leaderboard-list li { padding: 10px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>
    <div id="crosshair"></div>
    <button id="settings-btn">SETTINGS</button>

    <div id="hud">
        <div class="stat-label">Subject Integrity</div>
        <div class="stat-value"><span id="hp-text">150</span> / 150</div>
        <div id="hp-container"><div id="hp-fill"></div></div>
        <div class="stat-label" style="margin-top:20px;">Eliminations</div>
        <div class="stat-value" id="score-text">0</div>
    </div>

    <div id="ammo-hud">
        <div class="stat-label">Energy Core</div>
        <div class="stat-value"><span id="ammo-text">5</span> / 5</div>
        <div id="reload-text" style="color:var(--neon-magenta); font-size:12px; visibility:hidden;">RELOADING...</div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="overlay-panel">
        <h1 style="color:var(--neon-cyan); letter-spacing:10px;">CYBER STRIKE</h1>
        <button class="primary-btn" id="start-btn">Initialize</button>
    </div>

    <!-- Settings Menu -->
    <div id="settings-panel" class="overlay-panel">
        <h3>SYSTEM SETTINGS</h3>
        <div class="setting-row">
            <label>SENSITIVITY: <span id="sens-val">0.002</span></label>
            <input type="range" id="sens-slider" min="0.0005" max="0.008" step="0.0001" value="0.002">
        </div>
        <button class="primary-btn" onclick="document.getElementById('settings-panel').style.display='none'">Back</button>
    </div>

    <!-- Game Over -->
    <div id="game-over-panel" class="overlay-panel" style="display:none">
        <h2 style="color:var(--neon-magenta);">CRITICAL FAILURE</h2>
        <p>Your consciousness has been disconnected.</p>
        <ul id="leaderboard-list"></ul>
        <button class="primary-btn" onclick="location.reload()">Reboot</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "firebase/firestore";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBufMLTIXLeBjj_kNTPKEKyKCU29Zb4iD8",
            authDomain: "d-gungame.firebaseapp.com",
            projectId: "d-gungame",
            storageBucket: "d-gungame.firebasestorage.app",
            messagingSenderId: "799621642625",
            appId: "1:799621642625:web:16b00ab30d466f4c2fd080"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Game State ---
        let score = 0, hp = 150, ammo = 5, isReloading = false;
        let sensitivity = 0.002, gameActive = false, gameEnded = false;
        let pitch = 0, yaw = 0, recoilOffset = 0;
        const keys = {};
        const enemies = [];

        // --- Settings ---
        document.getElementById('settings-btn').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('settings-panel').style.display = 'block';
        };
        document.getElementById('sens-slider').oninput = (e) => {
            sensitivity = parseFloat(e.target.value);
            document.getElementById('sens-val').innerText = sensitivity.toFixed(4);
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        // Grid Floor
        const grid = new THREE.GridHelper(100, 50, 0x00f2ff, 0x002222);
        scene.add(grid);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ color: 0x050505 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- Gun Setup ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        const gunNeon = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.16, 0.3), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
        gunNeon.position.y = 0.02;
        gunGroup.add(gunBody, gunNeon);
        gunGroup.position.set(0.3, -0.25, -0.4);
        camera.add(gunGroup);
        scene.add(camera);

        // --- Enemy Logic ---
        function createEnemy() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const neonMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.4), mat);
            body.position.y = 0.8;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
            head.position.y = 1.6;
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.1), neonMat);
            eye.position.set(0, 1.65, 0.2);
            
            // Robot Gun
            const rGun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), mat);
            rGun.position.set(0.5, 1.0, 0.3);
            
            group.add(body, head, eye, rGun);
            
            // Position
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 10;
            group.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
            
            group.userData = { hp: 2, lastShot: 0 };
            scene.add(group);
            enemies.push(group);
        }

        // Spawn 4 initial enemies
        for(let i=0; i<4; i++) createEnemy();

        // --- Combat System ---
        function shoot() {
            if (!gameActive || isReloading || ammo <= 0) return;
            
            ammo--;
            document.getElementById('ammo-text').innerText = ammo;
            
            // Recoil Start
            recoilOffset += 0.08; 
            gunGroup.position.z += 0.1; // Gun kick back

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(enemies, true);

            if (hits.length > 0) {
                let target = hits[0].object;
                while(target.parent && !target.userData.hp) target = target.parent;
                
                if(target.userData.hp) {
                    target.userData.hp--;
                    if(target.userData.hp <= 0) {
                        scene.remove(target);
                        enemies.splice(enemies.indexOf(target), 1);
                        score++;
                        document.getElementById('score-text').innerText = score;
                        setTimeout(createEnemy, 2000);
                    }
                }
            }
            if (ammo === 0) reload();
        }

        function reload() {
            if (isReloading) return;
            isReloading = true;
            document.getElementById('reload-text').style.visibility = 'visible';
            setTimeout(() => {
                ammo = 5;
                isReloading = false;
                document.getElementById('ammo-text').innerText = ammo;
                document.getElementById('reload-text').style.visibility = 'hidden';
            }, 1500);
        }

        // --- Game Loops ---
        function animate(t) {
            requestAnimationFrame(animate);
            if (!gameActive || gameEnded) {
                renderer.render(scene, camera);
                return;
            }

            // 1. Movement
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
            if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
            move.normalize();
            camera.position.x += (Math.sin(yaw)*move.z + Math.sin(yaw+Math.PI/2)*move.x) * 0.12;
            camera.position.z += (Math.cos(yaw)*move.z + Math.cos(yaw+Math.PI/2)*move.x) * 0.12;

            // 2. Camera Recoil Handling (Return mechanism)
            recoilOffset = THREE.MathUtils.lerp(recoilOffset, 0, 0.1); // Decay recoil
            camera.rotation.set(pitch + recoilOffset, yaw, 0);

            // 3. Gun Animations
            gunGroup.position.z = THREE.MathUtils.lerp(gunGroup.position.z, -0.4, 0.1);
            if(isReloading) gunGroup.rotation.x = THREE.MathUtils.lerp(gunGroup.rotation.x, -1, 0.1);
            else gunGroup.rotation.x = THREE.MathUtils.lerp(gunGroup.rotation.x, 0, 0.1);

            // 4. Enemy AI
            enemies.forEach(en => {
                en.lookAt(camera.position.x, 0, camera.position.z);
                const dist = en.position.distanceTo(camera.position);
                if(dist > 8) {
                    en.translateZ(0.05);
                } else {
                    // Attack
                    if(t - en.userData.lastShot > 1500) {
                        playerHit();
                        en.userData.lastShot = t;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        function playerHit() {
            hp -= 15;
            document.getElementById('hp-text').innerText = Math.max(0, hp);
            document.getElementById('hp-fill').style.width = (hp / 150 * 100) + "%";
            document.getElementById('damage-flash').style.background = 'rgba(255,0,0,0.2)';
            setTimeout(() => document.getElementById('damage-flash').style.background = 'transparent', 100);
            if(hp <= 0) endGame();
        }

        async function endGame() {
            gameEnded = true;
            gameActive = false;
            document.exitPointerLock();
            const name = prompt("SYSTEM CRITICAL. ENTER ID FOR RECORDS:", "Unit_01") || "Unit_01";
            
            try {
                await addDoc(collection(db, "leaderboard"), { name, score, at: serverTimestamp() });
                const snap = await getDocs(query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5)));
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                snap.forEach(d => list.innerHTML += `<li><span>${d.data().name}</span> <span>${d.data().score}</span></li>`);
                document.getElementById('game-over-panel').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        // --- Event Listeners ---
        document.getElementById('start-btn').onclick = () => document.body.requestPointerLock();

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                gameActive = true;
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('ammo-hud').style.display = 'block';
            } else {
                gameActive = false;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
        });

        document.addEventListener('mousedown', (e) => { if(e.button===0) shoot(); });
        document.addEventListener('keydown', (e) => { keys[e.code]=true; if(e.code==='KeyR') reload(); });
        document.addEventListener('keyup', (e) => keys[e.code]=false);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
