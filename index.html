<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS 射擊遊戲 - D-GunGame</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        canvas { display: block; }

        /* 準心 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* UI 資訊欄 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 10;
        }
        .stat-box { margin-bottom: 5px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 5px; }

        /* 排行榜面板 */
        #leaderboard-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            color: white;
            padding: 40px;
            border-radius: 20px;
            display: none;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid #444;
        }
        h2 { color: #ffcc00; margin-top: 0; }
        #leaderboard-list { list-style: none; padding: 0; margin: 25px 0; font-size: 18px; }
        #leaderboard-list li { 
            padding: 10px; 
            border-bottom: 1px solid #333; 
            display: flex; 
            justify-content: space-between;
        }
        #leaderboard-list li:last-child { border-bottom: none; }
        button {
            padding: 12px 30px;
            cursor: pointer;
            font-size: 18px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background: #ff5e4d; }

        #start-hint {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <div class="stat-box">分數：<span id="score">0</span></div>
        <div class="stat-box">時間：<span id="timer">30</span>s</div>
    </div>

    <div id="start-hint">點擊畫面開始遊戲</div>

    <div id="leaderboard-panel">
        <h2>🏆 戰績排行榜</h2>
        <ul id="leaderboard-list">
            <!-- 這裡會由 JS 填入 -->
        </ul>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <!-- 模組化引入 Three.js 與 Firebase -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "firebase/firestore";

        // --- 1. Firebase 初始化 (使用你提供的設定) ---
        const firebaseConfig = {
          apiKey: "AIzaSyBufMLTIXLeBjj_kNTPKEKyKCU29Zb4iD8",
          authDomain: "d-gungame.firebaseapp.com",
          projectId: "d-gungame",
          storageBucket: "d-gungame.firebasestorage.app",
          messagingSenderId: "799621642625",
          appId: "1:799621642625:web:16b00ab30d466f4c2fd080",
          measurementId: "G-RXHQCJNNVX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 2. 遊戲核心變數 ---
        let score = 0;
        let timeLeft = 30;
        let gameStarted = false;
        let gameEnded = false;
        let enemy = null;

        // Three.js 場景設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        scene.fog = new THREE.Fog(0x202020, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 燈光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 10, 7.5);
        scene.add(sunLight);

        // 地板 (格子狀)
        const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
        scene.add(gridHelper);
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 3. 操作控制 (Pointer Lock & Keyboard) ---
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousedown', () => {
            if (gameEnded) return;
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
            } else {
                shoot();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                if (!gameStarted) {
                    gameStarted = true;
                    document.getElementById('start-hint').style.display = 'none';
                    startTimer();
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && !gameEnded) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                // 限制仰角避免翻轉
                camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x));
            }
        });

        // --- 4. 敵人與射擊判定 ---
        function spawnEnemy() {
            if (enemy) scene.remove(enemy);
            const size = 1 + Math.random();
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0x330000 });
            enemy = new THREE.Mesh(geo, mat);
            
            // 隨機在玩家前方一定範圍內生成
            enemy.position.set(
                (Math.random() - 0.5) * 40,
                size / 2,
                (Math.random() - 0.5) * 40
            );
            scene.add(enemy);
        }
        spawnEnemy();

        const raycaster = new THREE.Raycaster();
        function shoot() {
            if (!gameStarted || gameEnded) return;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObject(enemy);

            if (intersects.length > 0) {
                score++;
                document.getElementById('score').innerText = score;
                // 擊中效果：立刻重生
                spawnEnemy();
            }
        }

        // --- 5. 遊戲流程與 Firebase 整合 ---
        function startTimer() {
            const timerInterval = setInterval(() => {
                if (gameEnded) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        async function endGame() {
            gameEnded = true;
            document.exitPointerLock();
            
            const name = prompt(`遊戲結束！你的分數是 ${score}。\n請輸入你的大名：`, "匿名戰士");
            const playerName = name || "匿名戰士";

            try {
                // 1. 上傳分數
                await addDoc(collection(db, "leaderboard"), {
                    name: playerName,
                    score: score,
                    createdAt: serverTimestamp()
                });

                // 2. 抓取前五名
                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5));
                const querySnapshot = await getDocs(q);
                
                const listEl = document.getElementById('leaderboard-list');
                listEl.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    listEl.innerHTML += `<li><span>${data.name}</span> <span>${data.score} PTS</span></li>`;
                });

                document.getElementById('leaderboard-panel').style.display = 'block';
            } catch (err) {
                console.error("Firebase Error:", err);
                alert("無法上傳成績，請確認 Firestore 權限已開啟 (Test Mode)。");
            }
        }

        // --- 6. 渲染與移動循環 ---
        camera.rotation.order = 'YXZ'; 
        camera.position.set(0, 1.7, 5); // 初始位置

        const velocity = 0.15;
        function animate() {
            requestAnimationFrame(animate);

            if (gameStarted && !gameEnded && document.pointerLockElement === document.body) {
                // 處理前後左右移動 (相對於視角)
                const direction = new THREE.Vector3();
                if (keys['KeyW']) direction.z -= 1;
                if (keys['KeyS']) direction.z += 1;
                if (keys['KeyA']) direction.x -= 1;
                if (keys['KeyD']) direction.x += 1;

                direction.normalize();
                
                // 根據相機 Y 軸旋轉計算移動方向
                const yaw = camera.rotation.y;
                camera.position.x += (Math.sin(yaw) * direction.z + Math.sin(yaw + Math.PI/2) * direction.x) * velocity;
                camera.position.z += (Math.cos(yaw) * direction.z + Math.cos(yaw + Math.PI/2) * direction.x) * velocity;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
