<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #87CEEB; }
        canvas { display: block; }

        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }

        /* 遊戲 UI */
        #game-ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            pointer-events: none; display: none;
        }
        #ammo-ui {
            position: absolute; bottom: 30px; right: 40px;
            color: #ffcc00; font-size: 40px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            display: none;
        }
        #reload-hint {
            position: absolute; top: 60%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444; font-size: 30px; font-weight: bold;
            display: none; text-shadow: 0 0 10px black;
        }

        /* 設定與啟動面板 */
        #menu-panel, #leaderboard-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px;
            text-align: center; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .setting-item { margin: 15px 0; text-align: left; }
        .setting-item label { display: block; font-size: 14px; color: #555; }
        input[type="range"] { width: 100%; }

        button {
            width: 100%; padding: 15px; margin-top: 10px;
            background: #4CAF50; color: white; border: none;
            border-radius: 10px; font-size: 18px; cursor: pointer;
        }
        button:hover { background: #45a049; }

        #leaderboard-list { list-style: none; padding: 0; text-align: left; }
        #leaderboard-list li { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    
    <!-- 遊戲中 UI -->
    <div id="game-ui">
        <div>分數: <span id="score">0</span></div>
        <div>剩餘時間: <span id="timer">30</span>s</div>
    </div>
    <div id="ammo-ui">AMMO: <span id="ammo-val">5</span>/5</div>
    <div id="reload-hint">RELOADING...</div>

    <!-- 初始選單 -->
    <div id="menu-panel">
        <h2 style="margin-top:0">遊戲設定</h2>
        <div class="setting-item">
            <label>滑鼠靈敏度: <span id="sens-val">0.002</span></label>
            <input type="range" id="sens-slider" min="0.0005" max="0.01" step="0.0005" value="0.002">
        </div>
        <div class="setting-item">
            <label>遊戲時限: <span id="time-val">30</span> 秒</label>
            <input type="range" id="time-slider" min="10" max="120" step="10" value="30">
        </div>
        <button id="start-btn">進入並開始遊戲</button>
        <p style="font-size:12px; color:#888;">操作: WASD 移動 / 左鍵射擊 / R 換彈</p>
    </div>

    <!-- 排行榜 -->
    <div id="leaderboard-panel" style="display:none">
        <h2 style="color:#4CAF50">🏆 遊戲結束</h2>
        <ul id="leaderboard-list"></ul>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "firebase/firestore";

        // --- Firebase 設定 ---
        const firebaseConfig = {
          apiKey: "AIzaSyBufMLTIXLeBjj_kNTPKEKyKCU29Zb4iD8",
          authDomain: "d-gungame.firebaseapp.com",
          projectId: "d-gungame",
          storageBucket: "d-gungame.firebasestorage.app",
          messagingSenderId: "799621642625",
          appId: "1:799621642625:web:16b00ab30d466f4c2fd080",
          measurementId: "G-RXHQCJNNVX"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 核心變數 ---
        let score = 0, ammo = 5, isReloading = false;
        let gameTime = 30, sensitivity = 0.002;
        let gameActive = false, gameEnded = false;
        const keys = {};

        // --- UI 交互 ---
        const sensSlider = document.getElementById('sens-slider');
        const timeSlider = document.getElementById('time-slider');
        sensSlider.oninput = () => { sensitivity = parseFloat(sensSlider.value); document.getElementById('sens-val').innerText = sensitivity; };
        timeSlider.oninput = () => { gameTime = parseInt(timeSlider.value); document.getElementById('time-val').innerText = gameTime; };

        document.getElementById('start-btn').onclick = () => {
            document.body.requestPointerLock();
        };

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 天藍色
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光源
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // 好看的彩色地板
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x99ff66 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        
        const grid = new THREE.GridHelper(200, 40, 0x000000, 0xdddddd);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- Roblox 小人 (可變色) ---
        let dummy = new THREE.Group();
        const dummyMaterials = [];

        function createDummy() {
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), createMat());
            head.position.y = 1.6;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.1, 0.5), createMat());
            torso.position.y = 0.8;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.9, 0.4), createMat());
            lArm.position.set(-0.7, 0.9, 0);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.9, 0.4), createMat());
            rArm.position.set(0.7, 0.9, 0);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), createMat());
            lLeg.position.set(-0.25, 0.4, 0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), createMat());
            rLeg.position.set(0.25, 0.4, 0);

            dummy.add(head, torso, lArm, rArm, lLeg, rLeg);
            scene.add(dummy);
            randomizeDummy();
        }

        function createMat() {
            const m = new THREE.MeshLambertMaterial({ color: 0xffffff });
            dummyMaterials.push(m);
            return m;
        }

        function randomizeDummy() {
            const newColor = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
            dummyMaterials.forEach(m => m.color.copy(newColor));
            dummy.position.set((Math.random()-0.5)*40, 0, (Math.random()-0.5)*40);
        }
        createDummy();

        // --- 槍械與彈藥邏輯 ---
        function shoot() {
            if (!gameActive || gameEnded || isReloading) return;

            if (ammo <= 0) {
                reload();
                return;
            }

            ammo--;
            updateAmmoUI();

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(dummy.children);
            
            if (hits.length > 0) {
                score++;
                document.getElementById('score').innerText = score;
                randomizeDummy();
            }

            if (ammo === 0) setTimeout(reload, 300);
        }

        function reload() {
            if (isReloading || ammo === 5) return;
            isReloading = true;
            document.getElementById('reload-hint').style.display = 'block';
            
            setTimeout(() => {
                ammo = 5;
                isReloading = false;
                updateAmmoUI();
                document.getElementById('reload-hint').style.display = 'none';
            }, 1500);
        }

        function updateAmmoUI() {
            document.getElementById('ammo-val').innerText = ammo;
        }

        // --- 輸入監聽 ---
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                gameActive = true;
                document.getElementById('menu-panel').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('ammo-ui').style.display = 'block';
                if (!gameEnded) startTimer();
            } else {
                gameActive = false;
            }
        });

        document.addEventListener('mousedown', (e) => { if(e.button === 0) shoot(); });
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR') reload();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if (gameActive) {
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        // --- 遊戲計時與結束 ---
        function startTimer() {
            document.getElementById('timer').innerText = gameTime;
            const itv = setInterval(() => {
                if (!gameActive) return;
                gameTime--;
                document.getElementById('timer').innerText = gameTime;
                if (gameTime <= 0) {
                    clearInterval(itv);
                    endGame();
                }
            }, 1000);
        }

        async function endGame() {
            gameEnded = true;
            document.exitPointerLock();
            const name = prompt(`時間到！得分: ${score}\n輸入名字登入排行榜:`, "玩家1");
            
            try {
                await addDoc(collection(db, "leaderboard"), {
                    name: name || "未知",
                    score: score,
                    at: serverTimestamp()
                });

                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5));
                const snap = await getDocs(q);
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<li><span>${data.name}</span> <span>${data.score} 分</span></li>`;
                });
                document.getElementById('leaderboard-panel').style.display = 'block';
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('ammo-ui').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        // --- 渲染循環 ---
        camera.position.set(0, 1.7, 5);
        function animate(t) {
            requestAnimationFrame(animate);
            if (gameActive) {
                const moveSpeed = 0.12;
                const dir = new THREE.Vector3();
                if (keys['KeyW']) dir.z -= 1;
                if (keys['KeyS']) dir.z += 1;
                if (keys['KeyA']) dir.x -= 1;
                if (keys['KeyD']) dir.x += 1;
                dir.normalize();

                const yaw = camera.rotation.y;
                camera.position.x += (Math.sin(yaw) * dir.z + Math.sin(yaw + Math.PI/2) * dir.x) * moveSpeed;
                camera.position.z += (Math.cos(yaw) * dir.z + Math.cos(yaw + Math.PI/2) * dir.x) * moveSpeed;

                // 小人簡單 AI
                dummy.translateZ(0.05);
                if (Math.abs(dummy.position.x) > 48 || Math.abs(dummy.position.z) > 48) dummy.rotation.y += Math.PI;
                // 肢體動畫
                const swing = Math.sin(t * 0.005) * 0.5;
                dummy.children[2].rotation.x = swing; // L Arm
                dummy.children[3].rotation.x = -swing; // R Arm
                dummy.children[4].rotation.x = -swing; // L Leg
                dummy.children[5].rotation.x = swing; // R Leg
            }
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
