<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS - Gun & Animation Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #87CEEB; }
        canvas { display: block; }

        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }

        /* 遊戲 UI */
        #game-ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 20px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; display: none;
        }
        #health-bar-container {
            width: 200px; height: 15px; background: rgba(0,0,0,0.5);
            border: 2px solid white; margin-top: 5px; border-radius: 10px; overflow: hidden;
        }
        #health-bar-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.2s; }
        
        #ammo-ui {
            position: absolute; bottom: 30px; right: 40px;
            color: #ffcc00; font-size: 40px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); display: none;
        }

        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0); pointer-events: none; z-index: 5;
            transition: background 0.1s;
        }

        /* 選單與排行榜 */
        #menu-panel, #leaderboard-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px;
            text-align: center; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100;
        }
        button {
            width: 100%; padding: 15px; margin-top: 10px;
            background: #222; color: white; border: none;
            border-radius: 10px; font-size: 18px; cursor: pointer;
        }
        #leaderboard-list { list-style: none; padding: 0; text-align: left; }
        #leaderboard-list li { padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>
    <div id="crosshair"></div>
    
    <div id="game-ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>TIME: <span id="timer">30</span>s</div>
        <div id="health-bar-container"><div id="health-bar-fill"></div></div>
    </div>

    <div id="ammo-ui"><span id="ammo-val">5</span> / 5</div>

    <div id="menu-panel">
        <h2 style="margin-top:0">FPS 戰鬥訓練</h2>
        <p style="font-size: 14px; color: #666;">WASD 移動 | 左鍵射擊 | R 換彈</p>
        <div style="text-align:left; margin: 15px 0;">
            <label>靈敏度: <span id="sens-val">0.002</span></label>
            <input type="range" id="sens-slider" min="0.0005" max="0.008" step="0.0005" value="0.002" style="width:100%">
        </div>
        <button id="start-btn">開始遊戲</button>
    </div>

    <div id="leaderboard-panel" style="display:none">
        <h2 id="end-title">遊戲結束</h2>
        <ul id="leaderboard-list"></ul>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "firebase/firestore";

        // --- Firebase ---
        const firebaseConfig = {
          apiKey: "AIzaSyBufMLTIXLeBjj_kNTPKEKyKCU29Zb4iD8",
          authDomain: "d-gungame.firebaseapp.com",
          projectId: "d-gungame",
          storageBucket: "d-gungame.firebasestorage.app",
          messagingSenderId: "799621642625",
          appId: "1:799621642625:web:16b00ab30d466f4c2fd080"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 核心變數 ---
        let score = 0, ammo = 5, playerHP = 150;
        let gameTime = 30, sensitivity = 0.002;
        let gameActive = false, gameEnded = false;
        let isReloading = false;
        let recoilY = 0; // 用於平滑處理相機後座力
        const keys = {};

        // --- 初始化 Three.js ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // 地板
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x558833 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(100, 40, 0x000000, 0x446622));

        // --- 手持槍模與動畫 ---
        const gunGroup = new THREE.Group();
        function buildGun() {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 0.5), new THREE.MeshLambertMaterial({ color: 0x222222 }));
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.4), new THREE.MeshLambertMaterial({ color: 0x111111 }));
            barrel.position.z = -0.3;
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.12), new THREE.MeshLambertMaterial({ color: 0x332211 }));
            grip.position.set(0, -0.15, 0.1);
            gunGroup.add(body, barrel, grip);
            
            // 初始槍枝在相機前的位置
            gunGroup.position.set(0.3, -0.3, -0.5);
            camera.add(gunGroup);
            scene.add(camera);
        }
        buildGun();

        // --- 機器人 AI ---
        let dummy = new THREE.Group();
        let dLArm, dRArm;
        function buildDummy() {
            const mat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), mat); head.position.y = 1.6;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.0,0.4), mat); torso.position.y = 0.8;
            dLArm = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); dLArm.position.set(-0.6,0.9,0);
            dRArm = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); dRArm.position.set(0.6,0.9,0);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); lLeg.position.set(-0.25,0.4,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); rLeg.position.set(0.25,0.4,0);
            dummy.add(head, torso, dLArm, dRArm, lLeg, rLeg);
            scene.add(dummy);
            respawnDummy();
        }
        function respawnDummy() {
            const a = Math.random()*Math.PI*2;
            dummy.position.set(Math.cos(a)*20, 0, Math.sin(a)*20);
        }
        buildDummy();

        // --- 戰鬥與動畫邏輯 ---
        let gunBobTime = 0;
        let gunKick = 0; // 開火回震量
        let reloadAnim = 0; // 換彈進度 0~1

        function shoot() {
            if (!gameActive || gameEnded || isReloading || ammo <= 0) {
                if(ammo <= 0) reload();
                return;
            }
            ammo--;
            updateUI();
            
            // 視覺回饋
            gunKick = 0.15; // 槍枝向後震動
            recoilY = 0.05; // 相機向上彈

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            if (ray.intersectObjects(dummy.children).length > 0) {
                score++;
                respawnDummy();
            }
        }

        function reload() {
            if (isReloading || ammo === 5) return;
            isReloading = true;
            reloadAnim = 0;
            setTimeout(() => {
                ammo = 5; isReloading = false;
                updateUI();
            }, 1200);
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('ammo-val').innerText = ammo;
            document.getElementById('health-bar-fill').style.width = (playerHP/150*100) + "%";
        }

        // --- 主循環 ---
        let lastAttack = 0;
        camera.position.set(0, 1.7, 5);

        function animate(t) {
            requestAnimationFrame(animate);
            if (!gameActive || gameEnded) return;

            // 1. 移動
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
            if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
            move.normalize();
            const yaw = camera.rotation.y;
            camera.position.x += (Math.sin(yaw)*move.z + Math.sin(yaw+Math.PI/2)*move.x) * 0.12;
            camera.position.z += (Math.cos(yaw)*move.z + Math.cos(yaw+Math.PI/2)*move.x) * 0.12;

            // 2. 槍枝與相機動畫
            // 相機回彈
            camera.rotation.x += recoilY;
            recoilY *= 0.8; // 相機抖動快速衰減
            
            // 走路搖擺
            if(move.length() > 0) gunBobTime += 0.15;
            const bobX = Math.cos(gunBobTime) * 0.01;
            const bobY = Math.sin(gunBobTime * 2) * 0.01;

            // 換彈動畫處理
            if(isReloading) {
                reloadAnim = THREE.MathUtils.lerp(reloadAnim, 1, 0.05);
                gunGroup.rotation.x = Math.sin(reloadAnim * Math.PI) * -0.8;
                gunGroup.position.y = -0.3 + Math.sin(reloadAnim * Math.PI) * -0.2;
            } else {
                reloadAnim = 0;
                gunGroup.rotation.x = 0;
                gunGroup.position.set(0.3 + bobX, -0.3 + bobY, -0.5 + gunKick);
            }
            gunKick *= 0.8; // 槍枝震動回歸

            // 3. 機器人 AI 與攻擊
            dummy.lookAt(camera.position.x, 0, camera.position.z);
            const dist = dummy.position.distanceTo(camera.position);
            if(dist > 1.8) {
                dummy.translateZ(0.07);
            } else if(t - lastAttack > 1000) {
                // 機器人攻擊動畫
                dLArm.rotation.x = -1.5; dRArm.rotation.x = -1.5;
                setTimeout(()=> { dLArm.rotation.x = 0; dRArm.rotation.x = 0; }, 200);
                
                playerHP -= 15;
                lastAttack = t;
                document.getElementById('damage-flash').style.background = 'rgba(255,0,0,0.3)';
                setTimeout(()=> document.getElementById('damage-flash').style.background = 'transparent', 100);
                updateUI();
                if(playerHP <= 0) endGame("你被擊敗了！");
            }
            
            // 機器人走路動畫
            const dummySwing = Math.sin(t * 0.006) * 0.5;
            dummy.children[4].rotation.x = dummySwing;
            dummy.children[5].rotation.x = -dummySwing;

            renderer.render(scene, camera);
        }

        // --- 事件監聽 ---
        document.getElementById('start-btn').onclick = () => document.body.requestPointerLock();
        const sensSlider = document.getElementById('sens-slider');
        sensSlider.oninput = () => { sensitivity = parseFloat(sensSlider.value); document.getElementById('sens-val').innerText = sensitivity; };

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                gameActive = true;
                document.getElementById('menu-panel').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('ammo-ui').style.display = 'block';
                if(score === 0) startTimer();
            } else gameActive = false;
        });

        document.addEventListener('mousemove', (e) => {
            if(gameActive) {
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            }
        });

        document.addEventListener('mousedown', (e) => { if(e.button===0) shoot(); });
        document.addEventListener('keydown', (e) => { keys[e.code]=true; if(e.code==='KeyR') reload(); });
        document.addEventListener('keyup', (e) => keys[e.code]=false);

        function startTimer() {
            const itv = setInterval(() => {
                if(!gameActive || gameEnded) return;
                gameTime--;
                document.getElementById('timer').innerText = gameTime;
                if(gameTime <= 0) { clearInterval(itv); endGame("時間到！"); }
            }, 1000);
        }

        async function endGame(title) {
            if(gameEnded) return;
            gameEnded = true;
            document.exitPointerLock();
            document.getElementById('end-title').innerText = title;
            const name = prompt(`${title}\n分數: ${score}\n請輸入你的代號:`, "無名戰士") || "未知";
            try {
                await addDoc(collection(db, "leaderboard"), { name, score, at: serverTimestamp() });
                const snap = await getDocs(query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5)));
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                snap.forEach(d => list.innerHTML += `<li><span>${d.data().name}</span> <span>${d.data().score} Kills</span></li>`);
                document.getElementById('leaderboard-panel').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
